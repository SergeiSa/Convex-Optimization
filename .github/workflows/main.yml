name: Build LaTeX document

on: 
  push:
  pull_request:
    types:
      - closed
    branches:
      - master



jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document Introduction
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/Introduction/

      - name: Compile LaTeX document Pseudoinverse
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/Pseudoinverse/

      - name: Compile LaTeX document AnalyticSolutions
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/AnalyticSolutions/

      - name: Compile LaTeX document Convexity
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/Convexity/

      - name: Compile LaTeX document Polytopes
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/Polytopes/

      - name: Compile LaTeX document QP
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: Slides_RU/QP/





      - name: Save Introduction artifact
        uses: actions/upload-artifact@v4
        with:
          name: Introduction.pdf
          path: Slides_RU/Introduction/main.pdf

      - name: Save Pseudoinverse artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pseudoinverse.pdf
          path: Slides_RU/Pseudoinverse/main.pdf

      - name: Save AnalyticSolutions artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnalyticSolutions.pdf
          path: Slides_RU/AnalyticSolutions/main.pdf

      - name: Save Convexity artifact
        uses: actions/upload-artifact@v4
        with:
          name: Convexity.pdf
          path: Slides_RU/Convexity/main.pdf

      - name: Save Polytopes artifact
        uses: actions/upload-artifact@v4
        with:
          name: Polytopes.pdf
          path: Slides_RU/Polytopes/main.pdf

      - name: Save QP artifact
        uses: actions/upload-artifact@v4
        with:
          name: QP.pdf
          path: Slides_RU/QP/main.pdf





      - name: Update compiled PDFs in git repository
        if: github.event.pull_request.merged == true || github.event_name == 'push'
        run: |
          mv Slides_RU/Introduction/main.pdf Slides_RU/Introduction.pdf
          mv Slides_RU/Pseudoinverse/main.pdf Slides_RU/Pseudoinverse.pdf
          mv Slides_RU/AnalyticSolutions/main.pdf Slides_RU/AnalyticSolutions.pdf
          mv Slides_RU/Convexity/main.pdf Slides_RU/Convexity.pdf
          mv Slides_RU/Polytopes/main.pdf Slides_RU/Polytopes.pdf
          mv Slides_RU/QP/main.pdf Slides_RU/QP.pdf

          git config --global user.name 'CI PDF compiler'
          git config --global user.email '<>'
          git add Slides_RU/Introduction.pdf
          git add Slides_RU/Pseudoinverse.pdf
          git add Slides_RU/AnalyticSolutions.pdf
          git add Slides_RU/Convexity.pdf
          git add Slides_RU/Polytopes.pdf
          git add Slides_RU/QP.pdf


          git commit -m "Update compiled PDFs"
          git push
